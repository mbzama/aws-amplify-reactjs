version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Install exact dependency versions from package-lock.json for reproducible builds
        - npm ci
    build:
      commands:
        # Create the optimised production bundle
        - npm run build
  artifacts:
    # Tell Amplify where Create React App writes the compiled output
    baseDirectory: build
    files:
      - '**/*'
  cache:
    # Cache node_modules between builds to significantly reduce build times
    paths:
      - node_modules/**/*
